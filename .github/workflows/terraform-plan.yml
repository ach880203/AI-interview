name: terraform-plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_ROOT: infra/terraform/aws-deploy-foundation

jobs:
  terraform-plan:
    name: terraform-plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/aws-deploy-foundation
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configure-aws-oidc
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: configure-aws-access-key
        if: ${{ vars.AWS_ROLE_TO_ASSUME == '' && secrets.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: setup-terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8

      - name: validate-terraform-values
        run: |
          test -n "${AWS_REGION}" || (echo "AWS_REGION 변수가 비어 있습니다." && exit 1)
          test -n "${{ vars.TF_FRONTEND_BUCKET_NAME || '' }}" || (echo "TF_FRONTEND_BUCKET_NAME 변수가 비어 있습니다." && exit 1)
          test -n "${{ vars.TF_EC2_SSH_PUBLIC_KEY || '' }}" || (echo "TF_EC2_SSH_PUBLIC_KEY 변수가 비어 있습니다." && exit 1)
          test -n "${{ vars.TF_SSH_INGRESS_CIDRS || '' }}" || (echo "TF_SSH_INGRESS_CIDRS 변수가 비어 있습니다." && exit 1)

      - name: terraform-fmt
        run: terraform fmt -check -recursive

      - name: terraform-init
        run: terraform init -input=false

      - name: terraform-validate
        run: terraform validate

      - name: terraform-plan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME || 'ai-interview' }}
          TF_VAR_frontend_bucket_name: ${{ vars.TF_FRONTEND_BUCKET_NAME || '' }}
          TF_VAR_backend_ecr_repository_name: ${{ vars.TF_BACKEND_ECR_REPOSITORY_NAME || 'ai-interview-backend' }}
          TF_VAR_ai_ecr_repository_name: ${{ vars.TF_AI_ECR_REPOSITORY_NAME || 'ai-interview-ai' }}
          TF_VAR_ssh_ingress_cidrs: ${{ vars.TF_SSH_INGRESS_CIDRS || '[]' }}
          TF_VAR_ec2_ssh_public_key: ${{ vars.TF_EC2_SSH_PUBLIC_KEY || '' }}
          TF_VAR_ec2_instance_type: ${{ vars.TF_EC2_INSTANCE_TYPE || 't3.large' }}
          TF_VAR_ec2_root_volume_size: ${{ vars.TF_EC2_ROOT_VOLUME_SIZE || '40' }}
          TF_VAR_ec2_key_pair_name: ${{ vars.TF_EC2_KEY_PAIR_NAME || 'ai-interview-deploy-key' }}
          TF_VAR_ec2_deploy_path: ${{ vars.TF_EC2_DEPLOY_PATH || '/opt/ai-interview' }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: upload-terraform-plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/terraform/aws-deploy-foundation/tfplan
          if-no-files-found: error
          retention-days: 7
