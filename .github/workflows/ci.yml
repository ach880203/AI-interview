name: ci

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install-dependencies
        run: npm ci

      - name: run-eslint
        run: npm run lint

      - name: build-frontend
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_KAKAO_CLIENT_ID: test-client-id
          VITE_KAKAO_REDIRECT_URI: http://localhost:5173/auth/kakao/callback
          VITE_PORTONE_STORE_ID: store-test
          VITE_PORTONE_CHANNEL_KEY: channel-test
        run: npm run build

  backend:
    name: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ai-interview
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: chmod-gradle
        run: chmod +x gradlew

      - name: run-tests
        run: ./gradlew test --no-daemon

  ai-server:
    name: ai-server-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-server
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-server/requirements.txt

      - name: install-dependencies
        run: pip install -r requirements.txt

      - name: compile-python
        run: python -m compileall .

  compose:
    name: compose-validate
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: validate-compose
        env:
          BACKEND_IMAGE: example.dkr.ecr.ap-northeast-2.amazonaws.com/ai-interview-backend:latest
          AI_SERVER_IMAGE: example.dkr.ecr.ap-northeast-2.amazonaws.com/ai-interview-ai:latest
          DB_PASSWORD: test-password
          JWT_SECRET: test-secret
          OPENAI_API_KEY: sk-test
          CORS_ORIGINS: https://example.com
          KAKAO_CLIENT_ID: test-kakao-client-id
          KAKAO_CLIENT_SECRET: test-kakao-client-secret
          KAKAO_REDIRECT_URI: https://example.com/auth/kakao/callback
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          docker compose -f deploy/ec2/docker-compose.prod.yml config > /dev/null

  docker-build:
    name: docker-build-validate
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: build-frontend-image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=http://localhost:8080 \
            -t ai-interview-frontend-ci \
            ./frontend

      - name: build-backend-image
        run: docker build -t ai-interview-backend-ci ./backend/ai-interview

      - name: build-ai-server-image
        run: docker build -t ai-interview-ai-ci ./ai-server
