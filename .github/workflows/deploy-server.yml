name: deploy-server

on:
  workflow_run:
    workflows:
      - build-release
    types:
      - completed

concurrency:
  group: deploy-server-production
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EC2_HOST: ${{ vars.EC2_HOST }}
  EC2_PORT: ${{ vars.EC2_PORT || '22' }}
  EC2_USER: ${{ vars.EC2_USER }}
  EC2_DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH || '/opt/ai-interview' }}

jobs:
  deploy-ec2:
    name: deploy-ec2
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: detect-server-deploy-config
        id: detect-config
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_APP_ENV_FILE: ${{ secrets.EC2_APP_ENV_FILE }}
        run: |
          if [ -n "${AWS_REGION}" ] \
            && [ -n "${EC2_HOST}" ] \
            && [ -n "${EC2_USER}" ] \
            && [ -n "${EC2_DEPLOY_PATH}" ] \
            && [ -n "${EC2_SSH_PRIVATE_KEY}" ] \
            && [ -n "${EC2_APP_ENV_FILE}" ]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: skip-server-deploy
        if: ${{ steps.detect-config.outputs.ready != 'true' }}
        run: |
          echo "::notice::EC2 배포 설정이 아직 비어 있어 deploy-server 워크플로는 건너뜁니다."

      - name: validate-ec2-values
        if: ${{ steps.detect-config.outputs.ready == 'true' }}
        run: |
          test -n "${AWS_REGION}" || (echo "AWS_REGION 변수가 비어 있습니다." && exit 1)
          test -n "${EC2_HOST}" || (echo "EC2_HOST 변수가 비어 있습니다." && exit 1)
          test -n "${EC2_USER}" || (echo "EC2_USER 변수가 비어 있습니다." && exit 1)
          test -n "${EC2_DEPLOY_PATH}" || (echo "EC2_DEPLOY_PATH 변수가 비어 있습니다." && exit 1)

      - name: checkout-release-commit
        if: ${{ steps.detect-config.outputs.ready == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: download-release-metadata
        if: ${{ steps.detect-config.outputs.ready == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: deploy-metadata

      - name: create-runtime-env-file
        if: ${{ steps.detect-config.outputs.ready == 'true' }}
        env:
          EC2_APP_ENV_FILE: ${{ secrets.EC2_APP_ENV_FILE }}
        run: |
          printf '%s' "${EC2_APP_ENV_FILE}" > deploy/ec2/.env.runtime
          sed -i 's/\r$//' deploy/ec2/.env.runtime
          python - <<'PY'
          import json
          from pathlib import Path

          metadata_path = Path("deploy-metadata/release-metadata.json")
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))

          runtime_path = Path("deploy/ec2/.env.runtime")
          with runtime_path.open("a", encoding="utf-8") as file:
              file.write("\n")
              file.write(f"BACKEND_IMAGE={metadata['backend_image']}\n")
              file.write(f"AI_SERVER_IMAGE={metadata['ai_image']}\n")
              file.write(f"ECR_REGISTRY={metadata['ecr_registry']}\n")
          PY

      - name: setup-ssh-key
        if: ${{ steps.detect-config.outputs.ready == 'true' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -p "${EC2_PORT}" "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: upload-deploy-files
        if: ${{ steps.detect-config.outputs.ready == 'true' }}
        run: |
          ssh -i ~/.ssh/ec2_deploy_key -p "${EC2_PORT}" "${EC2_USER}@${EC2_HOST}" "mkdir -p '${EC2_DEPLOY_PATH}'"
          scp -i ~/.ssh/ec2_deploy_key -P "${EC2_PORT}" deploy/ec2/docker-compose.prod.yml "${EC2_USER}@${EC2_HOST}:${EC2_DEPLOY_PATH}/docker-compose.prod.yml"
          scp -i ~/.ssh/ec2_deploy_key -P "${EC2_PORT}" deploy/ec2/deploy.sh "${EC2_USER}@${EC2_HOST}:${EC2_DEPLOY_PATH}/deploy.sh"
          scp -i ~/.ssh/ec2_deploy_key -P "${EC2_PORT}" deploy/ec2/.env.runtime "${EC2_USER}@${EC2_HOST}:${EC2_DEPLOY_PATH}/.env"

      - name: run-remote-deploy
        if: ${{ steps.detect-config.outputs.ready == 'true' }}
        run: |
          ssh -i ~/.ssh/ec2_deploy_key -p "${EC2_PORT}" "${EC2_USER}@${EC2_HOST}" "\
            chmod +x '${EC2_DEPLOY_PATH}/deploy.sh' && \
            DEPLOY_DIR='${EC2_DEPLOY_PATH}' \
            AWS_REGION='${AWS_REGION}' \
            bash '${EC2_DEPLOY_PATH}/deploy.sh'"
