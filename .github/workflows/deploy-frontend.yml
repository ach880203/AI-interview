name: deploy-frontend

on:
  workflow_run:
    workflows:
      - build-release
    types:
      - completed

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
  FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    name: s3-cloudfront-deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: validate-required-values
        run: |
          test -n "${AWS_REGION}" || (echo "AWS_REGION 변수가 비어 있습니다." && exit 1)
          test -n "${FRONTEND_S3_BUCKET}" || (echo "FRONTEND_S3_BUCKET 변수가 비어 있습니다." && exit 1)
          test -n "${FRONTEND_CLOUDFRONT_DISTRIBUTION_ID}" || (echo "FRONTEND_CLOUDFRONT_DISTRIBUTION_ID 변수가 비어 있습니다." && exit 1)

      - name: download-frontend-artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: frontend-dist

      - name: configure-aws-oidc
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: configure-aws-access-key
        if: ${{ vars.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: sync-to-s3
        run: aws s3 sync frontend-dist "s3://${FRONTEND_S3_BUCKET}" --delete

      - name: invalidate-cloudfront
        run: aws cloudfront create-invalidation --distribution-id "${FRONTEND_CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
