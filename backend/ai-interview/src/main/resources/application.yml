# ================================================================
# AI 면접 플랫폼 — 통합 애플리케이션 설정
#
# [환경별 동작]
# 로컬 개발: 환경변수 없이 아래 기본값(default)으로 실행
# Docker / 운영: 환경변수를 주입하여 기본값 덮어쓰기
#
# [필수 환경변수 (운영 배포 시)]
#   DB_URL             MariaDB JDBC URL
#   DB_USERNAME        DB 사용자명
#   DB_PASSWORD        DB 비밀번호
#   JWT_SECRET         Base64 인코딩된 HMAC-SHA256 시크릿 키
#   AI_SERVER_URL      Python FastAPI 서버 주소
#   CORS_ORIGINS       허용할 프론트엔드 도메인 (쉼표 구분)
# ================================================================

spring:
  application:
    name: ai-interview

  config:
    import:
      # [의도]
      # backend/ai-interview/.env 파일의 KEY=VALUE 형식을 Spring 설정으로 직접 읽어들입니다.
      # .env 안의 '#' 주석 줄은 무시되고, 주석 처리되지 않은 값만 환경설정으로 반영됩니다.
      #
      # [주의]
      # 실행 위치에 따라 상대 경로가 달라질 수 있어 현재 프로젝트 폴더와 상위 워크스페이스 경로를 둘 다 열어둡니다.
      # 둘 중 존재하는 파일만 optional로 읽고, 없는 경로는 조용히 건너뜁니다.
      - optional:file:.env[.properties]
      - optional:file:backend/ai-interview/.env[.properties]

  # ── 데이터베이스 ────────────────────────────────────────────
  datasource:
    # [중요] connectionCollation=utf8mb4_unicode_ci 를 URL에 명시해
    # MariaDB 커넥션 세션의 character_set_connection 을 utf8mb4 로 강제합니다.
    # characterEncoding=UTF-8 만으로는 Java↔JDBC 레이어만 UTF-8로 설정되고
    # MariaDB 서버 세션 charset 은 서버 기본값(latin1 등)이 그대로 쓰여
    # 한글 텍스트가 DB에 저장될 때 '?' 로 변환되는 문제가 발생합니다.
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3308/ai_interview_chang?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul}}
    username: ${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:root}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:1234}}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      # 커넥션 풀 최대 크기 (로컬: 5, 운영: 20 권장)
      maximum-pool-size: ${DB_POOL_SIZE:5}
      # 커넥션 획득 대기 시간 (ms)
      connection-timeout: 30000
      # 유휴 커넥션 제거 대기 시간 (ms, 10분)
      idle-timeout: 600000
      # 커넥션 최대 수명 (ms, 30분 — MariaDB wait_timeout 보다 짧게)
      max-lifetime: 1800000
      # 커넥션 생성 직후 SET NAMES utf8mb4 실행 — 세션 charset 강제 적용
      # DDL(ddl-auto: update) 및 DML 모두 utf8mb4 로 처리되어
      # 한글·이모지 포함 모든 유니코드 문자가 손실 없이 저장됩니다.
      connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci"

  # ── JPA / Hibernate ─────────────────────────────────────────
  jpa:
    hibernate:
      # 로컬: update (스키마 자동 반영)
      # 운영: validate 또는 none (마이그레이션 툴 사용)
      ddl-auto: ${JPA_DDL_AUTO:update}
    # 로컬: SQL 로그 출력, 운영: false 권장
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
        dialect: org.hibernate.dialect.MariaDBDialect
    # data.sql이 JPA 테이블 생성 이후에 실행되도록 지연
    defer-datasource-initialization: true

  # ── SQL 초기 데이터 ─────────────────────────────────────────
  sql:
    init:
      # always: data.sql 실행 (learning_subjects 시드 데이터 삽입)
      # never : 운영 환경에서 데이터 초기화를 막으려면 환경변수로 never 주입
      mode: ${SQL_INIT_MODE:always}

# ── 서버 포트 ──────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}

# ── JWT 인증 ───────────────────────────────────────────────────
jwt:
  # Base64 인코딩된 HMAC-SHA256 시크릿 키 (운영 시 반드시 교체)
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1haS1pbnRlcnZpZXctcGxhdGZvcm0hIQ==}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}     # 60분 (ms)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}  # 1일  (ms)

# ── PortOne 결제 ──────────────────────────────────────────────────
# PortOne 관리자 콘솔(https://admin.portone.io) > 결제 연동 > 시크릿 키 발급
# 비어 있으면 개발 환경에서 검증을 건너뜁니다 (PortOneService 참고)
portone:
  secret-key: ${PORTONE_SECRET_KEY:}

# ── 카카오 OAuth ─────────────────────────────────────────────────
# 카카오 개발자 콘솔(https://developers.kakao.com)에서 앱 등록 후:
# - REST API 키 → KAKAO_CLIENT_ID 환경변수
# - Client Secret (선택) → KAKAO_CLIENT_SECRET 환경변수
# - 리다이렉트 URI → 카카오 앱 설정의 Redirect URI와 반드시 일치해야 함
kakao:
  client-id: ${KAKAO_CLIENT_ID:}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/auth/kakao/callback}

# ── CORS ───────────────────────────────────────────────────────
# SecurityConfig의 @Value("${cors.allowed-origins}") String[] 에 주입됨
# 로컬: 콤마 구분 localhost 포트 목록 (기본값)
# 운영: CORS_ORIGINS 환경변수로 실제 도메인 주입
#       예) CORS_ORIGINS=https://your-domain.com
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}

# ── 파일 업로드 ──────────────────────────────────────────────────
spring.servlet.multipart:
  max-file-size: 20MB
  max-request-size: 20MB

# 업로드 파일 저장 디렉토리 (절대 경로 또는 상대 경로)
file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

# ── Python AI 서버 연동 ────────────────────────────────────────
ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:8000}
  service:
    # true  = MockAiService 사용 (Python 서버 없이 동작, STT 미작동)
    # false = PythonAiService 사용 (Python 서버 필수)
    mock: ${AI_SERVICE_MOCK:false}

# ── 로깅 ───────────────────────────────────────────────────────
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.aimentor: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    # 운영 시 아래 두 줄 환경변수로 WARN 으로 올리면 SQL 로그 억제 가능
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_SQL_BIND:TRACE}
