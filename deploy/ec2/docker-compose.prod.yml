services:
  # 운영 DB는 EC2 내부 네트워크에서만 접근하도록 포트를 외부에 열지 않습니다.
  mariadb:
    image: mariadb:11.4
    container_name: ai-interview-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-ai_interview}
      # 초기 DB 생성 시 전용 앱 계정을 명시적으로 만드는 init 스크립트에서 사용할 값입니다.
      APP_DB_USERNAME: ${DB_USERNAME:-aiapp}
      APP_DB_PASSWORD: ${DB_PASSWORD}
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10

  # ChromaDB도 내부 통신 전용으로 두어 외부 노출을 줄입니다.
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-interview-chroma
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      # 최신 Chroma 공식 이미지는 실제 데이터 경로로 /data 를 사용합니다.
      # 운영 환경에서도 로컬과 같은 경로를 써야 재시작 시 데이터 위치가 어긋나지 않습니다.
      - chroma_data:/data

  ai-server:
    image: ${AI_SERVER_IMAGE}
    container_name: ai-interview-ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 운영에서는 내부 서비스명으로 고정해 두어 EC2 내부 주소 변경에 덜 민감하게 둡니다.
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      PYTHONUNBUFFERED: "1"
    healthcheck:
      # AI 서버가 포트만 열렸는지보다 실제 헬스 엔드포인트 응답이 가능한지를 확인해야
      # 백엔드가 너무 일찍 붙어서 첫 호출부터 실패하는 상황을 줄일 수 있습니다.
      test: ["CMD", "python", "-c", "import json, urllib.request, sys; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)); sys.exit(0 if data.get('status') == 'ok' else 1)"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      - chromadb

  backend:
    image: ${BACKEND_IMAGE}
    container_name: ai-interview-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      # Spring Boot는 application.yml에서 DB_URL / DB_USERNAME / DB_PASSWORD를 읽도록 되어 있습니다.
      # 운영에서는 컨테이너 내부 서비스명으로 고정해서 DB 연결 경로를 단순하게 유지합니다.
      DB_URL: jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE:-ai_interview}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul
      DB_USERNAME: ${DB_USERNAME:-aiapp}
      AI_SERVER_URL: http://ai-server:8000
      # t3.small에서 Java 프로세스가 메모리를 과하게 점유하면 다른 컨테이너까지 같이 불안정해질 수 있어
      # 힙 상한을 명시해 운영 서버 전체가 한 번에 죽는 상황을 줄입니다.
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m
      SPRING_PROFILES_ACTIVE: prod
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      # 업로드 파일은 컨테이너 재시작 후에도 유지되어야 하므로 볼륨으로 분리합니다.
      - uploads_data:/app/uploads
    depends_on:
      mariadb:
        condition: service_healthy
      ai-server:
        condition: service_healthy

volumes:
  mariadb_data:
  chroma_data:
  uploads_data:
