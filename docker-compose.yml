services:
  # ── MariaDB ───────────────────────────────────────────────────
  mariadb:
    image: mariadb:11.4
    container_name: ai-interview-db
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-1234}
      MARIADB_DATABASE: ai_interview
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB (Vector DB) ──────────────────────────────────────
  # 면접 문서를 벡터로 저장하고 RAG 검색에 사용합니다.
  # 데이터는 chroma_data 볼륨에 영속 저장됩니다.
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-interview-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"   # 외부 8001 → 컨테이너 8000 (ChromaDB 기본 포트)
    volumes:
      # 최신 Chroma 공식 이미지는 실제 저장 경로로 /data 를 사용합니다.
      # 예전 경로(/chroma/chroma)로 두면 컨테이너는 떠도 데이터가 기대한 위치에 남지 않을 수 있습니다.
      - chroma_data:/data
    environment:
      # 익명 텔레메트리 비활성화 (프라이버시)
      ANONYMIZED_TELEMETRY: "false"

  # ── Python AI 서버 ────────────────────────────────────────────
  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: ai-interview-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ChromaDB 연결 설정 — 컨테이너명으로 접근
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    env_file:
      - ./ai-server/.env
    depends_on:
      chromadb:
        # chromadb/chroma:latest 이미지에는 curl 이 없어 healthcheck 기반 대기가 자주 깨집니다.
        # 여기서는 컨테이너 시작 완료까지만 기다리고, 실제 API 응답은 애플리케이션 레벨에서 확인합니다.
        condition: service_started

  # ── Spring Boot 백엔드 ────────────────────────────────────────
  backend:
    build:
      context: ./backend/ai-interview
      dockerfile: Dockerfile
    container_name: ai-interview-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # DB 연결 — 컨테이너 내부에서 mariadb 서비스명으로 접근
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/ai_interview?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1234}
      # AI 서버 — 컨테이너 내부에서 ai-server 서비스명으로 접근
      AI_SERVER_URL: http://ai-server:8000
      # 운영 프로파일 활성화 (ddl-auto=validate, SQL 로그 비활성화)
      SPRING_PROFILES_ACTIVE: prod
      # CORS 허용 오리진 — 프론트엔드 도메인으로 설정
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost}
    depends_on:
      mariadb:
        condition: service_healthy
      ai-server:
        condition: service_started

  # ── React 프론트엔드 ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite 빌드 타임에 번들에 포함되는 API 주소
        # 로컬: http://localhost:8080 / 운영: https://api.your-domain.com
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: ai-interview-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mariadb_data:
  chroma_data:
